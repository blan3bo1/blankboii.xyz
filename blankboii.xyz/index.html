<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blankboii</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent-1: #e45eff;
            --accent-2: #267de0;
            --glass-bg: rgba(228, 94, 255, 0.03);
            --glass-border: rgba(38, 125, 224, 0.25);
            --radius: 24px;
        }

        @font-face { font-family: 'SimSun'; src: local('SimSun'); }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; text-transform: lowercase; }

        body {
            background: #000;
            font-family: 'SimSun', serif;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* hidden audio player */
        #bg-audio {
            display: none;
        }

        /* animated gradient background */
        .gradient-bg {
            position: fixed; inset: 0;
            background: linear-gradient(125deg, #0a0a0a, #1a0f2a, #0c1a2f);
            background-size: 400% 400%;
            animation: gradientFlow 16s ease infinite;
            z-index: -2;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .noise-overlay {
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* weather particles */
        #weather {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .raindrop, .leaf, .snowflake {
            position: absolute;
            animation: fall linear forwards;
            user-select: none;
        }
        .raindrop { background: rgba(38,125,224,0.5); width: 1px; height: 14px; }
        .leaf { font-size: 1.3rem; filter: drop-shadow(0 0 4px rgba(228,94,255,0.4)); }
        .snowflake { color: #e45eff; font-size: 1.1rem; opacity: 0.5; text-shadow: 0 0 6px #e45eff; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }

        /* landing */
        #landing {
            position: fixed; inset: 0;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .shake-box { animation: shake 0.18s infinite; }
        #typing-start { font-size: 16px; letter-spacing: 4px; color: #fff; }
        @keyframes shake { 0%,100%{ transform:translate(0,0); } 25%{ transform:translate(1px,-1px); } 75%{ transform:translate(-1px,1px); } }

        /* main content */
        #main-content {
            height: 100vh; display: none;
            justify-content: center; align-items: center;
            opacity: 0; transition: 2s ease;
        }

        .container-wrapper { position: relative; display: flex; align-items: center; }

        /* LIQUID GLASS CARD */
        .bio-card {
            background: rgba(10, 5, 20, 0.4);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid var(--glass-border);
            width: 480px; padding: 45px 45px 35px 45px; 
            border-radius: var(--radius);
            z-index: 2;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(228,94,255,0.1) inset;
        }

        /* sidebar */
        .social-sidebar {
            position: absolute; left: 100%;
            background: rgba(38, 125, 224, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(228,94,255,0.25);
            border-left: none;
            height: 210px; width: 52px;
            border-radius: 0 var(--radius) var(--radius) 0;
            display: flex; flex-direction: column; justify-content: space-evenly; align-items: center;
            transform: translateX(-10px); opacity: 0;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .container-wrapper:hover .social-sidebar { transform: translateX(0px); opacity: 1; }
        .side-icon { color: #fff; opacity: 0.6; font-size: 18px; transition: 0.3s; text-decoration: none; }
        .side-icon:hover { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 8px #e45eff); }

        /* header */
        .card-header { display: flex; align-items: center; gap: 25px; margin-bottom: 30px; }
        .pfp-container { position: relative; width: 80px; height: 80px; }
        .pfp-glow {
            position: absolute; inset: -4px; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, #e45eff, #267de0, transparent);
            animation: spin 3.5s linear infinite; opacity: 0; transition: 0.6s ease;
        }
        .pfp-container:hover .pfp-glow { opacity: 1; }
        .pfp-img {
            position: relative; width: 100%; height: 100%;
            border-radius: 50%; object-fit: cover;
            border: 1px solid rgba(228,94,255,0.5); z-index: 2; background: #0a0a0a;
        }

        .username { font-size: 26px; color: #fff; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
        .username i { color: #267de0; font-size: 14px; filter: drop-shadow(0 0 5px #e45eff); }

        .guild-tag {
            font-size: 10px; color: #b38aff; opacity: 0.8;
            font-family: monospace; letter-spacing: 1px; margin-top: 3px;
        }

        /* status indicator line */
        .status-row {
            margin: 20px 0 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #c7aaff;
            border-bottom: 1px dashed rgba(228,94,255,0.2);
            padding-bottom: 18px;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #888;
            box-shadow: 0 0 8px currentColor;
        }
        .status-online { background: #e45eff; color: #e45eff; box-shadow: 0 0 10px #e45eff; }
        .status-idle { background: #ffaa00; color: #ffaa00; }
        .status-dnd { background: #ff4444; color: #ff4444; }

        /* activity feed */
        .activity-feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 20px 0 20px;
            max-height: 160px;
            overflow-y: auto;
            padding-right: 8px;
            scrollbar-width: thin;
            scrollbar-color: #e45eff #1a0f2a;
        }
        .activity-feed::-webkit-scrollbar {
            width: 4px;
        }
        .activity-feed::-webkit-scrollbar-track {
            background: #1a0f2a;
        }
        .activity-feed::-webkit-scrollbar-thumb {
            background: #e45eff;
            border-radius: 4px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            padding: 8px 10px;
            background: rgba(228,94,255,0.03);
            border: 1px solid rgba(38,125,224,0.15);
            border-radius: 12px;
            transition: 0.2s;
        }
        .activity-item:hover {
            background: rgba(228,94,255,0.08);
            border-color: rgba(228,94,255,0.3);
        }
        .activity-icon {
            width: 24px;
            text-align: center;
            color: #e45eff;
            font-size: 14px;
        }
        .activity-content {
            flex: 1;
            line-height: 1.4;
        }
        .activity-name {
            font-weight: 600;
            color: #fff;
            font-size: 12px;
        }
        .activity-detail {
            color: #b38aff;
            font-size: 10px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }
        .custom-status-emoji {
            font-size: 16px;
            margin-right: 4px;
            vertical-align: middle;
        }
        .no-activity {
            color: #b38aff;
            text-align: center;
            padding: 16px;
            font-size: 11px;
            opacity: 0.7;
            font-style: italic;
        }

        /* spotify mini-progress */
        .spotify-progress {
            margin-top: 6px;
        }
        .spotify-bar {
            width: 100%;
            height: 2px;
            background: rgba(38,125,224,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .spotify-fill {
            height: 100%;
            background: linear-gradient(90deg, #e45eff, #267de0);
            width: 0%;
            transition: width 1s linear;
        }
        .spotify-times {
            display: flex;
            justify-content: space-between;
            color: #b38aff;
            font-size: 8px;
            margin-top: 3px;
        }

        /* typing bio area */
        .bio-typing-area { 
            height: 52px; margin: 20px 0 18px; color: #d1b3ff; 
            font-size: 13px; opacity: 0.9; line-height: 1.5; border-left: 2px solid #e45eff; padding-left: 14px;
        }

        /* footer */
        .footer-ui {
            margin-top: 24px; padding-top: 20px;
            border-top: 1px solid rgba(228,94,255,0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        .vol-control { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 10px; 
            color: #b38aff;
        }
        /* fixed volume slider styling */
        input[type="range"] { 
            -webkit-appearance: none; 
            background: transparent; 
            height: 4px; 
            width: 70px; 
            cursor: crosshair;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 3px;
            background: rgba(38,125,224,0.3);
            border-radius: 3px;
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 10px; 
            height: 10px; 
            background: #e45eff; 
            border-radius: 0; 
            margin-top: -3.5px;
            box-shadow: 0 0 8px #e45eff;
            cursor: crosshair;
        }
        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 3px;
            background: rgba(38,125,224,0.3);
            border-radius: 3px;
        }
        input[type="range"]::-moz-range-thumb {
            width: 10px;
            height: 10px;
            background: #e45eff;
            border: none;
            border-radius: 0;
            cursor: crosshair;
        }

        .views-box { display: flex; align-items: center; gap: 5px; font-size: 11px; opacity: 0.6; color: #b38aff; }

        /* copyright footer */
        .copyright-footer {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            font-size: 0.7rem;
            color: #b38aff;
            opacity: 0.5;
            letter-spacing: 0.5px;
            z-index: 100;
            font-family: monospace;
        }

        /* animations */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink { 50% { opacity: 0; } }

        /* time indicator */
        .time-indicator {
            position: fixed; bottom: 1rem; right: 1rem;
            background: rgba(228,94,255,0.1);
            border: 1px solid rgba(38,125,224,0.3);
            border-radius: 40px;
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
            backdrop-filter: blur(10px);
            z-index: 100;
            color: #b38aff;
        }
    </style>
</head>
<body>
    <!-- Hidden audio element with loop - using MP3 for better compatibility -->
    <audio id="bg-audio" loop>
        <source src="https://files.catbox.moe/zmmgpr.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="gradient-bg"></div>
    <div class="noise-overlay"></div>
    <div id="weather"></div>
    <div class="time-indicator" id="timeIndicator">PDT: --:-- --</div>
    <div class="copyright-footer">© 2025 blankboii. all rights reserved.</div>

    <!-- landing page -->
    <div id="landing" onclick="enterSite()">
        <div class="shake-box">
            <span id="typing-start"></span><span style="border-left: 2px solid #e45eff; margin-left: 5px; animation: blink 0.7s infinite;"></span>
        </div>
    </div>

    <!-- main content -->
    <div id="main-content">
        <div class="container-wrapper">
            <div class="bio-card">
                <div class="card-header">
                    <div class="pfp-container">
                        <div class="pfp-glow"></div>
                        <img id="discord-avatar" src="https://i.imgur.com/El3JhbL.png" class="pfp-img">
                    </div>
                    <div class="info">
                        <div class="username" onclick="copyUID()">
                            Blank <i class="fa-solid fa-circle-check"></i>
                        </div>
                        <div class="guild-tag" id="guild-tag">MIKE</div>
                    </div>
                </div>

                <div class="status-row" id="status-row">
                    <div class="status-dot status-online" id="status-dot"></div>
                    <span id="status-text">Do Not Disturb</span>
                    <span style="flex:1; text-align:right; opacity:0.5;"></span>
                </div>

                <div class="bio-typing-area shake-box">
                    <span id="typing-bio"></span><span style="border-left: 1px solid #e45eff; margin-left: 3px; animation: blink 0.9s infinite;"></span>
                </div>

                <!-- dynamic activity feed -->
                <div id="activity-feed" class="activity-feed">
                    <div class="no-activity">fetching status...</div>
                </div>

                <div class="footer-ui">
                    <div class="vol-control">
                        <i class="fa-solid fa-volume-off" id="vol-icon"></i>
                        <input type="range" id="vol" min="0" max="1" step="0.01" value="0.3">
                    </div>
                    <div class="views-box">
                        <i class="fa-regular fa-eye"></i>
                        <span id="views-counter" class="lottery-text">0</span>
                    </div>
                </div>
            </div>

            <div class="social-sidebar">
                <a href="https://links.blankboii.xyz" target="_blank" class="side-icon"><i class="fas fa-link"></i></a>
                <a href="https://github.com/blan3bo1" target="_blank" class="side-icon"><i class="fab fa-github"></i></a>
                <a href="https://x.com/blan3bo1" target="_blank" class="side-icon"><i class="fab fa-twitter"></i></a>
                <a href="https://discord.com/users/1353737272989581436" target="_blank" class="side-icon"><i class="fab fa-discord"></i></a>
                <a href="https://open.spotify.com/user/31rn6fe3mmxbcxelf6yxz7zvbysa" target="_blank" class="side-icon"><i class="fab fa-spotify"></i></a>
            </div>
        </div>
    </div>

    <script>
        // --- user data ---
        const DISCORD_ID = '1353737272989581436';
        const GUILD_TAG = "MIKE";

        // --- REAL VIEW COUNTER ---
        let views = localStorage.getItem('siteViews');
        if (views === null) views = 1;
        else views = parseInt(views) + 1;
        localStorage.setItem('siteViews', views);
        function formatViews(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
        document.getElementById('views-counter').textContent = formatViews(views);

        // --- audio element and volume control ---
        const audio = document.getElementById('bg-audio');
        const volSlider = document.getElementById('vol');
        const volIcon = document.getElementById('vol-icon');

        // Set initial volume
        audio.volume = 0.3;

        // Volume slider control
        volSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            audio.volume = val;
            
            // Update icon based on volume
            if (val == 0) {
                volIcon.className = 'fa-solid fa-volume-off';
            } else if (val < 0.33) {
                volIcon.className = 'fa-solid fa-volume-low';
            } else if (val < 0.66) {
                volIcon.className = 'fa-solid fa-volume';
            } else {
                volIcon.className = 'fa-solid fa-volume-high';
            }
        });

        // Play audio when user enters site (to comply with autoplay policies)
        function playAudio() {
            audio.play().catch(e => console.log('Audio play failed:', e));
        }

        // --- typing engine ---
        function setupTyping(elementId, phrases) {
            let p = 0, c = 0, d = false;
            const el = document.getElementById(elementId);
            function type() {
                const txt = phrases[p];
                el.textContent = d ? txt.substring(0, c--) : txt.substring(0, c++);
                if (!d && c > txt.length) { d = true; setTimeout(type, 2000); }
                else if (d && c < 0) { d = false; p = (p + 1) % phrases.length; setTimeout(type, 500); }
                else { setTimeout(type, d ? 45 : 110); }
            }
            type();
        }

        setupTyping("typing-start", [
            "I'm Too Tired", "Sleep :3", "I'm Asleep, so don't ask", "Blank"
        ]);

        setupTyping("typing-bio", [
            "Sleeping ngl is the best."
        ]);

        // --- enter site ---
        function enterSite() {
            document.getElementById('landing').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('landing').style.display = 'none';
                const m = document.getElementById('main-content');
                m.style.display = 'flex';
                setTimeout(() => m.style.opacity = '1', 50);
                startWeather();
                playAudio(); // Start audio when entering site
            }, 1000);
        }

        function copyUID() {
            navigator.clipboard.writeText("1353737272989581436");
            alert("user id copied");
        }

        // --- weather particles ---
        let weatherDirection = 0;
        let currentWeatherType = '';
        let weatherInterval;

        const weatherTypes = {
            rain: { create: createRaindrop, interval: 500, directionRange: [-12,-8,-4,0,4,8,12], duration: [9,13] },
            leaves: { create: createLeaf, types: ['🍂','🍁','🥮','🌰'], interval: 750, directionRange: [-18,-12,-6,0,6,12,18], colors: ['#e45eff','#a56eff','#267de0','#b38aff'], duration: [11,16] },
            snow: { create: createSnowflake, types: ['❄','❅','❆'], interval: 600, directionRange: [-8,-5,-3,0,3,5,8], duration: [13,19] }
        };

        function getPDTTime() { return new Date(new Date().toLocaleString("en-US", { timeZone: "America/Los_Angeles" })); }
        function updateTimeIndicator() {
            const pdt = getPDTTime();
            const str = pdt.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true });
            document.getElementById('timeIndicator').textContent = `PDT: ${str}`;
        }
        setInterval(updateTimeIndicator, 1000); updateTimeIndicator();

        function getWeatherTypeByHour() { const h=getPDTTime().getHours(); return (h>=6&&h<12)?'rain':(h>=12&&h<18)?'leaves':'snow'; }
        function createRaindrop() { 
            const d = document.createElement('div'); d.className = 'raindrop';
            d.style.left = Math.random()*100+'vw';
            const dur = Math.random()*6+7;
            d.style.animationDuration = dur+'s';
            d.style.opacity = Math.random()*0.4+0.2;
            d.style.height = Math.random()*12+8+'px';
            d.style.transform = `rotate(${weatherDirection}deg)`;
            document.getElementById('weather').appendChild(d);
            setTimeout(()=>d.remove(), dur*1000+500);
        }
        function createLeaf() {
            const d = document.createElement('div'); d.className = 'leaf';
            d.innerHTML = weatherTypes.leaves.types[Math.floor(Math.random()*weatherTypes.leaves.types.length)];
            d.style.left = Math.random()*100+'vw';
            const dur = Math.random()*8+8;
            d.style.animationDuration = dur+'s';
            d.style.opacity = Math.random()*0.5+0.3;
            d.style.fontSize = (Math.random()*12+18)+'px';
            const sway = (Math.random()-0.5)*12;
            d.style.transform = `rotate(${weatherDirection+sway}deg)`;
            d.style.color = weatherTypes.leaves.colors[Math.floor(Math.random()*weatherTypes.leaves.colors.length)];
            document.getElementById('weather').appendChild(d);
            setTimeout(()=>d.remove(), dur*1000+500);
        }
        function createSnowflake() {
            const d = document.createElement('div'); d.className = 'snowflake';
            d.innerHTML = ['❄','❅','❆'][Math.floor(Math.random()*3)];
            d.style.left = Math.random()*100+'vw';
            const dur = Math.random()*10+10;
            d.style.animationDuration = dur+'s';
            d.style.opacity = Math.random()*0.5+0.2;
            d.style.fontSize = (Math.random()*8+14)+'px';
            const sway = (Math.random()-0.5)*6;
            d.style.transform = `rotate(${weatherDirection+sway}deg)`;
            document.getElementById('weather').appendChild(d);
            setTimeout(()=>d.remove(), dur*1000+500);
        }
        function startWeather(type) {
            if (weatherInterval) clearInterval(weatherInterval);
            currentWeatherType = type;
            weatherInterval = setInterval(() => { weatherTypes[type].create(); }, weatherTypes[type].interval);
        }
        function updateWeatherByTime() {
            const newType = getWeatherTypeByHour();
            if (newType !== currentWeatherType) {
                if (weatherInterval) clearInterval(weatherInterval);
                document.getElementById('weather').innerHTML = '';
                startWeather(newType);
            }
        }
        setInterval(updateWeatherByTime, 60000);

        // --- DISCORD INTEGRATION (UPDATED TO EVERY SECOND) ---
        async function fetchDiscordStatus() {
            try {
                const r = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const d = await r.json();
                if (d.success) updateDiscordUI(d.data);
                else showFallbackActivities();
            } catch { showFallbackActivities(); }
        }

        function updateDiscordUI(data) {
            // update status dot
            const dot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            dot.className = 'status-dot';
            switch(data.discord_status) {
                case 'online': dot.classList.add('status-online'); statusText.textContent = 'online'; break;
                case 'idle': dot.classList.add('status-idle'); statusText.textContent = 'idle'; break;
                case 'dnd': dot.classList.add('status-dnd'); statusText.textContent = 'dnd'; break;
                default: statusText.textContent = 'offline';
            }
            // update avatar if possible
            if (data.discord_user?.avatar) {
                document.getElementById('discord-avatar').src = 
                    `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${data.discord_user.avatar}.png?size=256`;
            }
            // build activity feed
            const activities = data.activities || [];
            updateActivitiesFeed(activities);
        }

        function updateActivitiesFeed(activities) {
            const feed = document.getElementById('activity-feed');
            if (!activities.length) {
                feed.innerHTML = '<div class="no-activity">no active status</div>';
                return;
            }

            let html = '';
            activities.slice(0, 4).forEach(act => {
                const type = act.type;
                let icon = '⏺️';
                if (type === 0) icon = '🎮';
                else if (type === 1) icon = '📺';
                else if (type === 2) icon = '🎵';
                else if (type === 3) icon = '👀';
                else if (type === 4) icon = '💬';
                else if (type === 5) icon = '🏆';

                let content = '';
                if (type === 4) { // custom status
                    let emojiHtml = '';
                    if (act.emoji) {
                        if (act.emoji.id) {
                            emojiHtml = `<img src="https://cdn.discordapp.com/emojis/${act.emoji.id}.${act.emoji.animated?'gif':'png'}?size=20" style="width:16px; height:16px; vertical-align:middle; margin-right:4px;">`;
                        } else {
                            emojiHtml = `<span class="custom-status-emoji">${act.emoji.name}</span>`;
                        }
                    }
                    content = `<div class="activity-name">${emojiHtml}${act.state || 'custom status'}</div>`;
                } else {
                    content = `<div class="activity-name">${act.name}</div>`;
                    if (act.details) content += `<div class="activity-detail">${act.details}</div>`;
                    if (act.state) content += `<div class="activity-detail">${act.state}</div>`;
                }

                // spotify progress
                if (type === 2 && act.timestamps && act.timestamps.start && act.timestamps.end) {
                    const now = Date.now();
                    const total = act.timestamps.end - act.timestamps.start;
                    const elapsed = now - act.timestamps.start;
                    const percent = Math.min(100, (elapsed / total) * 100);
                    const format = (ms) => {
                        const s = Math.floor(ms / 1000);
                        return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2,'0')}`;
                    };
                    content += `
                        <div class="spotify-progress">
                            <div class="spotify-bar"><div class="spotify-fill" style="width:${percent}%"></div></div>
                            <div class="spotify-times">
                                <span>${format(elapsed)}</span>
                                <span>${format(total)}</span>
                            </div>
                        </div>
                    `;
                }

                html += `
                    <div class="activity-item">
                        <div class="activity-icon">${icon}</div>
                        <div class="activity-content">${content}</div>
                    </div>
                `;
            });
            feed.innerHTML = html;
        }

        function showFallbackActivities() {
            document.getElementById('activity-feed').innerHTML = `
                <div class="activity-item"><div class="activity-icon">💻</div><div class="activity-content"><div class="activity-name">offline</div><div class="activity-detail">status unavailable</div></div></div>
                <div class="activity-item"><div class="activity-icon">🎵</div><div class="activity-content"><div class="activity-name">spotify</div><div class="activity-detail">not playing</div></div></div>
            `;
        }

        // initial fetch + periodic (NOW EVERY SECOND)
        document.addEventListener('DOMContentLoaded', () => {
            currentWeatherType = getWeatherTypeByHour();
            startWeather(currentWeatherType);
            fetchDiscordStatus();
            setInterval(fetchDiscordStatus, 1000); // UPDATED TO 1000ms (1 second)
            
            // Preload audio but don't play yet (will play on enter)
            audio.load();
        });
    </script>
</body>
</html>
